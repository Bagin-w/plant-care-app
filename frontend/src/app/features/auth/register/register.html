<div class="auth-page">
  <div class="auth-card">
    <h1>🌿 Plant Care</h1>
    <p class="auth-subtitle">Erstelle ein neues Konto</p>

    <form (ngSubmit)="onSubmit()">
      <div class="form-group">
        <label for="name">Name</label>
        <input
          type="text"
          id="name"
          [(ngModel)]="name"
          name="name"
          required
        />
      </div>

      <div class="form-group">
        <label for="email">E-Mail</label>
        <input
          type="email"
          id="email"
          [(ngModel)]="email"
          name="email"
          required
        />
      </div>

      <div class="form-group">
        <label for="password">Passwort</label>
        <input
          type="password"
          id="password"
          [(ngModel)]="password"
          name="password"
          required
        />
      </div>

      @if (errorMessage()) {
        <p class="error">{{ errorMessage() }}</p>
      }

      <button type="submit" class="btn-full">Registrieren</button>
    </form>

    <p class="auth-link">
      Bereits ein Konto? <a routerLink="/login">Einloggen</a>
    </p>
  </div>
</div>
