<div class="login-container">
  <h1>Login</h1>

  <form (ngSubmit)="onSubmit()">
    <div class="form-group">
      <label for="email">E-Mail</label>
      <input
        type="email"
        id="email"
        [(ngModel)]="email"
        name="email"
        required
      />
    </div>

    <div class="form-group">
      <label for="password">Passwort</label>
      <input
        type="password"
        id="password"
        [(ngModel)]="password"
        name="password"
        required
      />
    </div>

    @if (errorMessage) {
      <p class="error">{{ errorMessage }}</p>
    }

    <button type="submit">Einloggen</button>
  </form>
</div>
