<div class="plant-list-container">
  <h1>Meine Pflanzen</h1>
  <a routerLink="/plants/new">+ Neue Pflanze</a>
  @if (errorMessage()) {
    <p class="error">{{ errorMessage() }}</p>
  }

  @if (plants().length === 0 && !errorMessage()) {
    <p>Du hast noch keine Pflanzen angelegt.</p>
  }

  <div class="plant-grid">
    @for (plant of plants(); track plant.id) {
      <div class="plant-card">
        <h3><a [routerLink]="['/plants', plant.id]">{{ plant.nickname }}</a></h3>
        <p>{{ plant.speciesName }}</p>
        <p>{{ plant.location }}</p>
        <button (click)="onDelete(plant.id)">Löschen</button>
      </div>
    }
  </div>
</div>
