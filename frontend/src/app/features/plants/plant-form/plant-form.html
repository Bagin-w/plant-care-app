<div class="plant-form-container">
  <h1>Neue Pflanze anlegen</h1>

  <form (ngSubmit)="onSubmit()">
    <div class="form-group">
      <label for="nickname">Name</label>
      <input type="text" id="nickname" [(ngModel)]="nickname" name="nickname" required />
    </div>

    <div class="form-group">
      <label for="speciesName">Pflanzenart</label>
      <input type="text" id="speciesName" [(ngModel)]="speciesName" name="speciesName" required />
    </div>

    <div class="form-group">
      <label for="location">Standort</label>
      <input type="text" id="location" [(ngModel)]="location" name="location" />
    </div>

    @if (errorMessage()) {
      <p class="error">{{ errorMessage() }}</p>
    }

    <button type="submit">Pflanze anlegen</button>
  </form>
</div>
